<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-assets>
    <video id="vid" src="magic.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
  </a-assets>

  <a-marker type="pattern" url="pattern-marker.patt">
    <a-video src="#vid" width="1.6" height="0.9" rotation="-90 0 0" scale="2 2 2"></a-video>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>
    

    <script>
      // This small script ensures the video plays when the marker is found
      window.addEventListener('click', function () {
        var v = document.querySelector('#vid');
        v.play();
      });
    </script>
  </body>
</html>
